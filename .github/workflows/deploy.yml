name: Autodeploy honeypresent

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Connect to server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.MOZAIKATEMPLATE_HOST }}
          username: ${{ secrets.MOZAIKATEMPLATE_USER }}
          key: ${{ secrets.MOZAIKATEMPLATE_KEY }}
          script: |
            #Переключаемся в нужную папку
            cd ~/medovye-podarki.rf/public_html/wp-content/themes/honeypresent
            
            #Клинируем репозиторий в папку (только для первой выгрузки!!!)
            #git clone https://github.com/site100ru/honeypresent.git .
            
            #Копируем репозиторий в папку
            git pull
            
            #Если кто то изменил файлы на сервере минуя GitHub, перезаписываем версию на сервере из GitHub
            #git reset --hard HEAD
            #git pull origin main
